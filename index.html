<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Modelo 3D</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: #d0d0d0;
}

canvas {
    display: block;
}

</style>


<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
  }
}
</script>


</head>


<body>


<script type="module">


import * as THREE from "three";

import { GLTFLoader } from 
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";

import { OrbitControls } from 
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js";



//================================
// ESCENA
//================================

const scene = new THREE.Scene();

scene.background = new THREE.Color(0xd0d0d0);



//================================
// CAMARA
//================================

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth / window.innerHeight,
0.1,
10000
);



//================================
// RENDER
//================================

const renderer = new THREE.WebGLRenderer({
    antialias:true
});


renderer.setSize(
window.innerWidth,
window.innerHeight
);


renderer.outputColorSpace = THREE.SRGBColorSpace;


renderer.toneMapping =
THREE.ACESFilmicToneMapping;


renderer.toneMappingExposure = 1.3;


document.body.appendChild(
renderer.domElement
);



//================================
// ILUMINACION TIPO CAD
//================================


// Luz ambiente uniforme

const ambient = new THREE.AmbientLight(
0xffffff,
3
);

scene.add(ambient);



// Luz frontal

const luz1 = new THREE.DirectionalLight(
0xffffff,
2
);

luz1.position.set(
5,
5,
10
);

scene.add(luz1);



// Luz lateral

const luz2 = new THREE.DirectionalLight(
0xffffff,
2
);

luz2.position.set(
-5,
5,
5
);

scene.add(luz2);



// Luz inferior

const luz3 = new THREE.DirectionalLight(
0xffffff,
1
);

luz3.position.set(
0,
-5,
5
);

scene.add(luz3);




//================================
// CONTROLES
//================================

const controls = new OrbitControls(
camera,
renderer.domElement
);


controls.enableDamping = true;

controls.dampingFactor = 0.08;



//================================
// CARGAR MODELO GLB
//================================

const loader = new GLTFLoader();



loader.load(

"modelo.glb",


(gltf)=>{


const modelo = gltf.scene;


scene.add(modelo);



// Mejorar apariencia de piezas

modelo.traverse((obj)=>{


    if(obj.isMesh){


        obj.castShadow = false;

        obj.receiveShadow = false;



        // Si tiene material

        if(obj.material){


            obj.material.needsUpdate = true;


            // Mantener colores originales
            // pero mejorar luz

            obj.material.metalness = 0;


            obj.material.roughness = 0.45;


        }


    }


});




// Centrar modelo

const caja = new THREE.Box3()
.setFromObject(modelo);



const centro = caja.getCenter(
new THREE.Vector3()
);



modelo.position.sub(
centro
);




// Ajustar cámara

const tamaño = caja.getSize(
new THREE.Vector3()
);


const maximo = Math.max(
tamaño.x,
tamaño.y,
tamaño.z
);



camera.position.set(
0,
0,
maximo * 2
);



controls.target.set(
0,
0,
0
);



controls.update();



console.log(
"Modelo cargado correctamente"
);


},



(xhr)=>{

console.log(
"Cargando:",
(xhr.loaded / xhr.total * 100).toFixed(1),
"%"
);

},



(error)=>{


console.error(
"Error cargando modelo:",
error
);


}


);




//================================
// ANIMACION
//================================

function animate(){


requestAnimationFrame(
animate
);


controls.update();


renderer.render(
scene,
camera
);


}


animate();




//================================
// AJUSTE DE VENTANA
//================================

window.addEventListener(
"resize",
()=>{


camera.aspect =
window.innerWidth /
window.innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(
window.innerWidth,
window.innerHeight
);


});


</script>


</body>

</html>
