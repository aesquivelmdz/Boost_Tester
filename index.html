<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor 3D - Modelo GLB</title>
  
  <!-- Librería model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #121212;
    }
  </style>
</head>
<body>

  <!-- Visor 3D apuntando directamente a tu archivo modelo.glb -->
  <model-viewer 
    src="modelo.glb" 
    alt="Modelo 3D" 
    camera-controls 
    auto-rotate 
    shadow-intensity="1" 
    exposure="1"
    touch-action="pan-y">
  </model-viewer>

</body>
</html>
