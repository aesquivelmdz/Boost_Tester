<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor 3D - Control de Piezas Padre</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      overflow: hidden;
      background-color: #1a1a1a;
      color: #fff;
    }

    /* Contenedor del render 3D */
    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* Menú lateral flotante para las piezas */
    #menu {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 280px;
      max-height: calc(100vh - 40px);
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
      z-index: 10;
    }

    #menu h2 {
      font-size: 1.1rem;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      color: #00d2ff;
    }

    /* Estilo de la lista de piezas */
    .part-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 6px 0;
    }

    .part-name {
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    /* Interruptor tipo Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444;
      transition: .3s;
      border-radius: 22px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #00d2ff;
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    /* Mensaje de carga */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      color: #fff;
      pointer-events: none;
    }
  </style>

  <!-- Import Map para cargar Three.js moderno desde CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div id="loading">Cargando modelo.glb...</div>

  <div id="menu">
    <h2>Piezas Principales</h2>
    <div id="parts-list"></div>
  </div>

  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. Configuración del Escenario 3D
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    // Cámara
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 5, 5);

    // Renderizador
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // Controles de órbita (Rotar con Click, Zoom con Rueda)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Iluminación
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // 2. Carga del Modelo .GLB
    const loader = new GLTFLoader();
    const partsList = document.getElementById('parts-list');
    const loadingText = document.getElementById('loading');

    loader.load('modelo.glb', (gltf) => {
      const model = gltf.scene;
      scene.add(model);
      loadingText.style.display = 'none';

      // Centrar la cámara automáticamente en el modelo
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      
      camera.position.set(center.x + maxDim * 1.5, center.y + maxDim * 1.5, center.z + maxDim * 1.5);
      controls.target.copy(center);
      controls.update();

      // 3. Filtrar únicamente las piezas PADRE
      // (Buscamos solo los hijos directos de la raíz del GLB)
      const parentNodes = model.children;

      parentNodes.forEach((parent, index) => {
        // Asignar un nombre legible si el nodo no tiene uno asignado en 3D
        const partName = parent.name && parent.name.trim() !== '' 
          ? parent.name 
          : `Pieza Padre ${index + 1}`;

        // Crear elemento en el menú lateral para la pieza padre
        const item = document.createElement('div');
        item.className = 'part-item';
        item.innerHTML = `
          <span class="part-name" title="${partName}">${partName}</span>
          <label class="switch">
            <input type="checkbox" checked data-index="${index}">
            <span class="slider"></span>
          </label>
        `;

        // Evento para ocultar / mostrar la pieza padre completa
        const checkbox = item.querySelector('input');
        checkbox.addEventListener('change', (e) => {
          // Cambia la visibilidad del padre (automáticamente oculta todos sus hijos)
          parent.visible = e.target.checked;
        });

        partsList.appendChild(item);
      });

    }, undefined, (error) => {
      console.error(error);
      loadingText.textContent = 'Error al cargar modelo.glb (Verifica que esté en la misma carpeta)';
    });

    // Ajustar el visor si se cambia el tamaño de la ventana
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Bucle de animación
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
