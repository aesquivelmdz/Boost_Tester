<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor 3D - Hijos de Primer Nivel</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      overflow: hidden;
      background-color: #1a1a1a;
      color: #fff;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* Menú lateral */
    #menu {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 290px;
      max-height: calc(100vh - 40px);
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
      z-index: 10;
    }

    #menu h2 {
      font-size: 1.1rem;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      color: #00d2ff;
    }

    .part-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 4px 0;
    }

    .part-name {
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 190px;
    }

    /* Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444;
      transition: .3s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #00d2ff;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      color: #fff;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div id="loading">Cargando modelo.glb...</div>

  <div id="menu">
    <h2>Piezas (Primer Nivel)</h2>
    <div id="parts-list"></div>
  </div>

  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. Configuración de Escena y Cámara
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Luces
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // 2. Carga y Filtrado de Hijos del Primer Nivel
    const loader = new GLTFLoader();
    const partsList = document.getElementById('parts-list');
    const loadingText = document.getElementById('loading');

    loader.load('modelo.glb', (gltf) => {
      const model = gltf.scene;
      scene.add(model);
      loadingText.style.display = 'none';

      // Centrar cámara
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      camera.position.set(center.x + maxDim * 1.5, center.y + maxDim * 1.5, center.z + maxDim * 1.5);
      controls.target.copy(center);
      controls.update();

      // --- LÓGICA DE DETECCIÓN DEL PRIMER NIVEL ---
      let firstLevelChildren = [];

      // Si la raíz tiene un solo nodo contenedor (ej. "Scene" o "Root"), bajamos 1 nivel
      if (model.children.length === 1 && model.children[0].children.length > 0) {
        firstLevelChildren = model.children[0].children;
      } else {
        firstLevelChildren = model.children;
      }

      // Crear interruptor para cada hijo del primer nivel
      firstLevelChildren.forEach((child, index) => {
        const name = child.name && child.name.trim() !== '' 
          ? child.name 
          : `Pieza ${index + 1}`;

        const item = document.createElement('div');
        item.className = 'part-item';
        item.innerHTML = `
          <span class="part-name" title="${name}">${name}</span>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
        `;

        const checkbox = item.querySelector('input');
        checkbox.addEventListener('change', (e) => {
          // Ocultar/Mostrar la pieza del primer nivel
          // (los sub-hijos de esta pieza mantendrán su relación pero se ocultarán junto con ella)
          child.visible = e.target.checked;
        });

        partsList.appendChild(item);
      });

    }, undefined, (error) => {
      console.error(error);
      loadingText.textContent = 'Error al cargar modelo.glb';
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
