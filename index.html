<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor 3D - Iluminación Optimizada</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      overflow: hidden;
      background-color: #1a1a1a;
      color: #fff;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* Menú lateral */
    #menu {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 290px;
      max-height: calc(100vh - 40px);
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
      z-index: 10;
    }

    #menu h2 {
      font-size: 1.1rem;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      color: #00d2ff;
    }

    .part-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 4px 0;
    }

    .part-name {
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 190px;
    }

    /* Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444;
      transition: .3s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #00d2ff;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      color: #fff;
    }
  </style>

  <!-- Import Map para cargar módulos de Three.js e iluminación de estudio -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div id="loading">Cargando modelo.glb...</div>

  <div id="menu">
    <h2>Piezas (Primer Nivel)</h2>
    <div id="parts-list"></div>
  </div>

  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // 1. Configuración del Escenario
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222); // Fondo gris suave para mejor contraste

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    
    // Configuración de renderizado de color profesional
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2; // Ajusta este valor si quieres más/menos brillo
    container.appendChild(renderer.domElement);

    // Entorno de iluminación HDRI virtual (simula un estudio de fotografía)
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 2. Sistema de Luces Multidireccional
    
    // Luz de cielo/suelo (evita partes bajas totalmente oscuras)
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2.0);
    hemiLight.position.set(0, 20, 0);
    scene.add(hemiLight);

    // Luz frontal principal
    const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.5);
    dirLight1.position.set(10, 20, 10);
    scene.add(dirLight1);

    // Luz trasera de relleno (para iluminar la espalda del modelo)
    const dirLight2 = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight2.position.set(-10, -10, -10);
    scene.add(dirLight2);

    // 3. Carga del Modelo .GLB y Creación del Menú
    const loader = new GLTFLoader();
    const partsList = document.getElementById('parts-list');
    const loadingText = document.getElementById('loading');

    loader.load('modelo.glb', (gltf) => {
      const model = gltf.scene;
      scene.add(model);
      loadingText.style.display = 'none';

      // Centrar cámara automáticamente
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      
      camera.position.set(center.x + maxDim * 1.5, center.y + maxDim * 1.5, center.z + maxDim * 1.5);
      controls.target.copy(center);
      controls.update();

      // Detección de piezas del primer nivel
      let firstLevelChildren = [];
      if (model.children.length === 1 && model.children[0].children.length > 0) {
        firstLevelChildren = model.children[0].children;
      } else {
        firstLevelChildren = model.children;
      }

      // Menú interactivo
      firstLevelChildren.forEach((child, index) => {
        const name = child.name && child.name.trim() !== '' 
          ? child.name 
          : `Pieza ${index + 1}`;

        const item = document.createElement('div');
        item.className = 'part-item';
        item.innerHTML = `
          <span class="part-name" title="${name}">${name}</span>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
          </label>
        `;

        const checkbox = item.querySelector('input');
        checkbox.addEventListener('change', (e) => {
          child.visible = e.target.checked;
        });

        partsList.appendChild(item);
      });

    }, undefined, (error) => {
      console.error(error);
      loadingText.textContent = 'Error al cargar modelo.glb';
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
