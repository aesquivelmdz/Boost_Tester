<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Visor 3D</title>

<style>

body {
    margin:0;
    overflow:hidden;
    background:#b8b8b8;
    font-family:Arial;
}


/* Panel de piezas */

#panel {

    position:absolute;
    top:10px;
    left:10px;

    background:rgba(255,255,255,0.9);

    padding:12px;

    border-radius:8px;

    max-height:90vh;

    overflow:auto;

    width:220px;

}


.item {

    margin:5px 0;

    font-size:14px;

}


canvas {

    display:block;

}


</style>


<script type="importmap">
{
 "imports":{
  "three":
  "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
 }
}
</script>


</head>


<body>


<div id="panel">

<b>Piezas</b>

<div id="lista"></div>

</div>



<script type="module">


import * as THREE from "three";


import { GLTFLoader } from
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";


import { OrbitControls } from
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js";




//=============================
// ESCENA
//=============================

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0xb8b8b8);



//=============================
// CAMARA
//=============================

const camera =
new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
10000
);



//=============================
// RENDER
//=============================

const renderer =
new THREE.WebGLRenderer({
antialias:true
});


renderer.setSize(
window.innerWidth,
window.innerHeight
);


renderer.outputColorSpace =
THREE.SRGBColorSpace;


document.body.appendChild(
renderer.domElement
);



//=============================
// LUCES
//=============================


scene.add(
new THREE.AmbientLight(
0xffffff,
1.2
)
);



const luz =
new THREE.DirectionalLight(
0xffffff,
2
);


luz.position.set(
8,10,12
);


scene.add(luz);



const luz2 =
new THREE.DirectionalLight(
0xffffff,
0.8
);


luz2.position.set(
-8,5,5
);


scene.add(luz2);



//=============================
// CONTROLES
//=============================

const controls =
new OrbitControls(
camera,
renderer.domElement
);


controls.enableDamping=true;



//=============================
// LISTA DE PIEZAS
//=============================

const lista =
document.getElementById(
"lista"
);



let piezas=[];




//=============================
// CARGAR GLB
//=============================


const loader =
new GLTFLoader();



loader.load(

"modelo.glb",


(gltf)=>{


const modelo =
gltf.scene;


scene.add(modelo);



// Buscar piezas

modelo.traverse(
(obj)=>{


if(obj.isMesh){


    piezas.push(obj);


    crearBoton(obj);


    if(obj.material){

        obj.material.roughness=0.65;

        obj.material.metalness=0;

    }


}


}

);




// Centrar

const caja =
new THREE.Box3()
.setFromObject(modelo);



const centro =
caja.getCenter(
new THREE.Vector3()
);



modelo.position.sub(
centro
);




const tamaño =
caja.getSize(
new THREE.Vector3()
);



const max =
Math.max(
tamaño.x,
tamaño.y,
tamaño.z
);



camera.position.z =
max*2;



controls.update();



console.log(
"Cantidad de piezas:",
piezas.length
);



},


undefined,


(error)=>{

console.error(error);

}


);





//=============================
// CREAR CHECKBOX
//=============================


function crearBoton(pieza){


let nombre =
pieza.name;


if(!nombre || nombre===""){

nombre="Pieza_"+(piezas.length);

}



let div =
document.createElement("div");


div.className="item";



let check =
document.createElement("input");


check.type="checkbox";

check.checked=true;



check.onchange=()=>{

pieza.visible =
check.checked;

};



div.appendChild(check);



div.appendChild(
document.createTextNode(
" "+nombre
)
);



lista.appendChild(div);



}





//=============================
// ANIMACION
//=============================


function animate(){


requestAnimationFrame(
animate
);


controls.update();


renderer.render(
scene,
camera
);


}


animate();





//=============================
// REDIMENSION
//=============================


window.addEventListener(
"resize",
()=>{


camera.aspect =
window.innerWidth/
window.innerHeight;


camera.updateProjectionMatrix();



renderer.setSize(
window.innerWidth,
window.innerHeight
);



});


</script>


</body>

</html>
