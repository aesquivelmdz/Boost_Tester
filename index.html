<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Visor 3D CAD</title>

<style>

body {
    margin:0;
    overflow:hidden;
    background:#b8b8b8;
    font-family:Arial;
}


#panel {

    position:absolute;
    top:10px;
    left:10px;

    width:240px;

    max-height:90vh;

    overflow:auto;

    background:rgba(255,255,255,0.9);

    padding:12px;

    border-radius:8px;

}


.item {

    margin:6px 0;

    font-size:14px;

}


canvas {

    display:block;

}

</style>


<script type="importmap">
{
 "imports":{
  "three":
  "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
 }
}
</script>


</head>


<body>


<div id="panel">

<b>Piezas</b>

<hr>

<div id="lista"></div>

</div>



<script type="module">


import * as THREE from "three";


import {GLTFLoader} from
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";


import {OrbitControls} from
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js";




//=================================
// ESCENA
//=================================

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0xb8b8b8);




//=================================
// CAMARA
//=================================

const camera =
new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
10000
);




//=================================
// RENDER
//=================================

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});


renderer.setSize(
window.innerWidth,
window.innerHeight
);


renderer.outputColorSpace =
THREE.SRGBColorSpace;


renderer.toneMapping =
THREE.ACESFilmicToneMapping;


renderer.toneMappingExposure = 1;


document.body.appendChild(
renderer.domElement
);




//=================================
// LUCES
//=================================

scene.add(
new THREE.AmbientLight(
0xffffff,
1.2
)
);



const luz1 =
new THREE.DirectionalLight(
0xffffff,
2
);

luz1.position.set(
8,
10,
12
);

scene.add(luz1);



const luz2 =
new THREE.DirectionalLight(
0xffffff,
0.8
);

luz2.position.set(
-8,
5,
5
);

scene.add(luz2);




//=================================
// CONTROLES
//=================================

const controls =
new OrbitControls(
camera,
renderer.domElement
);


controls.enableDamping=true;

controls.dampingFactor=0.08;




//=================================
// CARGAR MODELO
//=================================

const lista =
document.getElementById("lista");


const loader =
new GLTFLoader();



loader.load(

"modelo.glb",


(gltf)=>{


const modelo =
gltf.scene;


scene.add(modelo);



let contador=0;



modelo.traverse(
(obj)=>{


if(obj.isMesh){


console.log(
"PIEZA:",
obj.name
);



crearBoton(obj);



contador++;



if(obj.material){

obj.material.needsUpdate=true;

obj.material.metalness=0;

obj.material.roughness=0.65;

}



}


});


console.log(
"Piezas encontradas:",
contador
);



// Centrar

const caja =
new THREE.Box3()
.setFromObject(modelo);



const centro =
caja.getCenter(
new THREE.Vector3()
);


modelo.position.sub(
centro
);



const tamaño =
caja.getSize(
new THREE.Vector3()
);



const maximo =
Math.max(
tamaño.x,
tamaño.y,
tamaño.z
);



camera.position.set(
0,
0,
maximo*2
);



controls.target.set(
0,
0,
0
);


controls.update();



},



(xhr)=>{


console.log(
"Cargando:",
(xhr.loaded/xhr.total*100).toFixed(1),
"%"
);


},



(error)=>{


console.error(
"Error:",
error
);


}


);




//=================================
// CREAR CHECKBOX
//=================================

function crearBoton(pieza){



let nombre =
pieza.name;



if(!nombre || nombre==""){

nombre =
"Pieza";

}




const div =
document.createElement("div");


div.className="item";



const check =
document.createElement("input");


check.type="checkbox";

check.checked=true;




check.addEventListener(
"change",
()=>{


pieza.traverse(
(hijo)=>{

hijo.visible =
check.checked;

}
);


});




div.appendChild(check);



div.appendChild(
document.createTextNode(
" "+nombre
)
);



lista.appendChild(div);



}




//=================================
// ANIMACION
//=================================

function animate(){


requestAnimationFrame(
animate
);


controls.update();


renderer.render(
scene,
camera
);


}


animate();




//=================================
// AJUSTE PANTALLA
//=================================

window.addEventListener(
"resize",
()=>{


camera.aspect =
window.innerWidth/
window.innerHeight;


camera.updateProjectionMatrix();



renderer.setSize(
window.innerWidth,
window.innerHeight
);


});



</script>


</body>

</html>
