<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Modelo 3D</title>

<style>

body {
    margin: 0;
    overflow: hidden;
    background: #dddddd;
}

canvas {
    display: block;
}

</style>

</head>


<body>


<script type="module">

import * as THREE from 
'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

import { GLTFLoader } from 
'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';

import { OrbitControls } from 
'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';


//==============================
// ESCENA
//==============================

const scene = new THREE.Scene();

scene.background = new THREE.Color(0xdddddd);


//==============================
// CAMARA
//==============================

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth / window.innerHeight,
0.1,
10000
);


//==============================
// RENDER
//==============================

const renderer = new THREE.WebGLRenderer({
    antialias:true
});


renderer.setSize(
window.innerWidth,
window.innerHeight
);


renderer.outputColorSpace = THREE.SRGBColorSpace;

renderer.toneMapping = THREE.ACESFilmicToneMapping;

renderer.toneMappingExposure = 1.2;


document.body.appendChild(renderer.domElement);


//==============================
// LUCES
//==============================

const ambient = new THREE.AmbientLight(
0xffffff,
2
);

scene.add(ambient);


const light1 = new THREE.DirectionalLight(
0xffffff,
3
);

light1.position.set(
10,
10,
10
);

scene.add(light1);



const light2 = new THREE.DirectionalLight(
0xffffff,
2
);

light2.position.set(
-10,
-10,
10
);

scene.add(light2);


//==============================
// CONTROLES
//==============================

const controls = new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;


//==============================
// CARGAR MODELO GLB
//==============================

const loader = new GLTFLoader();


loader.load(

'modelo.glb',


function(gltf){


    const modelo = gltf.scene;


    scene.add(modelo);



    // Corregir materiales oscuros

    modelo.traverse((obj)=>{


        if(obj.isMesh){


            obj.material.needsUpdate = true;


            // Si no tiene color visible
            if(obj.material.color){

                obj.material.color.set(0x4488ff);

            }


            obj.material.metalness = 0;

            obj.material.roughness = 0.7;


        }


    });



    // Centrar modelo

    const box = new THREE.Box3()
    .setFromObject(modelo);



    const centro = box.getCenter(
        new THREE.Vector3()
    );


    modelo.position.sub(centro);



    // Ajustar cámara automáticamente

    const tamaño = box.getSize(
        new THREE.Vector3()
    );


    const maximo = Math.max(
        tamaño.x,
        tamaño.y,
        tamaño.z
    );


    camera.position.set(
        0,
        0,
        maximo * 2
    );


    controls.target.set(
        0,
        0,
        0
    );


    controls.update();


    console.log("Modelo cargado correctamente");


},


function(progress){

    console.log(
    "Cargando:",
    (progress.loaded / progress.total * 100).toFixed(1),
    "%"
    );

},


function(error){

    console.error(
    "Error cargando modelo:",
    error
    );

}


);


//==============================
// ANIMACION
//==============================

function animate(){


    requestAnimationFrame(animate);


    controls.update();


    renderer.render(
        scene,
        camera
    );


}


animate();



//==============================
// AJUSTE DE VENTANA
//==============================

window.addEventListener(
'resize',
()=>{


    camera.aspect =
    window.innerWidth /
    window.innerHeight;


    camera.updateProjectionMatrix();


    renderer.setSize(
    window.innerWidth,
    window.innerHeight
    );


});


</script>


</body>

</html>
