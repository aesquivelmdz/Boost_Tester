<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Modelo 3D</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#dddddd;
}
canvas {
    display:block;
}
</style>

<!-- Definir dónde está three -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
  }
}
</script>

</head>


<body>


<script type="module">

import * as THREE from "three";

import { GLTFLoader } from 
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";

import { OrbitControls } from 
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js";


// Escena

const scene = new THREE.Scene();

scene.background = new THREE.Color(0xdddddd);


// Cámara

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
10000
);


// Render

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(
renderer.domElement
);


// Luces

scene.add(
new THREE.AmbientLight(0xffffff,2)
);


const luz = new THREE.DirectionalLight(
0xffffff,
3
);

luz.position.set(10,10,10);

scene.add(luz);


// Controles

const controls = new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;


// Cargar GLB

const loader = new GLTFLoader();


loader.load(
"modelo.glb",

(gltf)=>{


const modelo = gltf.scene;


scene.add(modelo);


// Centrar modelo

const caja = new THREE.Box3()
.setFromObject(modelo);


const centro = caja.getCenter(
new THREE.Vector3()
);


modelo.position.sub(centro);



const tamaño = caja.getSize(
new THREE.Vector3()
);


const max = Math.max(
tamaño.x,
tamaño.y,
tamaño.z
);


camera.position.z = max * 2;


controls.update();


console.log("Modelo cargado");


},


undefined,


(error)=>{

console.error(
"Error:",
error
);

}

);



// Animación

function animar(){

requestAnimationFrame(animar);

controls.update();

renderer.render(
scene,
camera
);

}

animar();



// Ajustar pantalla

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>


</body>
</html>
